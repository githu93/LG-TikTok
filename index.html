<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TikTok TV</title>
    <!-- O segredo do PNG no navegador -->
    <link rel="icon" href="https://www.tiktok.com/favicon.ico">
    <style>
        body { margin: 0; background: #000; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .loader { width: 50px; height: 50px; border: 5px solid #fff; border-bottom-color: #ff0050; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <img src="https://www.tiktok.com/favicon.ico" width="80" style="margin-bottom: 20px;">
    <div class="loader"></div>
    <p>Otimizando suporte de controle...</p>

    <script>
        // Redireciona para a versão de "Explore" que tem botões maiores e aceita melhor o foco do controle
        // O tempo de 2 segundos é para garantir que a TV processe o ícone antes de sair da página
        setTimeout(function() {
            window.location.href = "https://www.tiktok.com/explore";
        }, 2000);
    </script>
</body>
</html>
