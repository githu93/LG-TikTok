<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok TV Otimizado</title>
    <link rel="icon" href="https://www.tiktok.com/favicon.ico">
    <style>
        body { 
            margin: 0; background: #000; color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif; overflow: hidden;
        }
        /* Zoom para as letras ficarem grandes na TV */
        html { zoom: 150%; } 
    </style>
</head>
<body>
    <div style="text-align: center;">
        <img src="https://www.tiktok.com/favicon.ico" width="100">
        <h1>A preparar suporte de comando...</h1>
    </div>

    <script>
        // Redireciona para o Explore, que é mais fácil de navegar
        setTimeout(function() {
            window.location.href = "https://www.tiktok.com/explore";
        }, 1500);

        // Suporte para o Comando (D-Pad)
        document.addEventListener('keydown', function(e) {
            // Este script ajuda a TV a focar nos botões "cinzas" que mencionaste
            const active = document.activeElement;
            if (e.keyCode === 40) { // Seta Baixo
                window.scrollBy(0, 200);
            } else if (e.keyCode === 38) { // Seta Cima
                window.scrollBy(0, -200);
            }
        });
    </script>
</body>
</html>
