name: Build webOS IPK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install webOS CLI
        run: npm install -g @webos-tools/cli

      - name: Package IPK
        run: |
          mkdir -p build
          # O comando oficial agora é ares-package
          ares-package . -o build/

      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-tv-app
          path: build/*.ipk
