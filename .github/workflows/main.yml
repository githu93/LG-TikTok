name: Build webOS IPK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite rodar manualmente se quiser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install webOS CLI
        run: |
          mkdir -p $HOME/webos-cli
          curl -L https://github.com/webos-tools/cli/releases/download/v1.12.4/webos-cli-1.12.4.tar.gz | tar -xz -C $HOME/webos-cli
          echo "$HOME/webos-cli/bin" >> $GITHUB_PATH

      - name: Package IPK
        run: |
          # Cria a pasta de output se não existir
          mkdir build
          # Empacota a pasta raiz (onde estão seu index.html e appinfo.json)
          webos-package . -o build/

      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: tiktok-tv-app
          path: build/*.ipk
