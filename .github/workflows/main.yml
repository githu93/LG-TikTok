name: Build webOS IPK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Install webOS CLI
        run: |
          mkdir -p $HOME/webos-cli
          curl -L https://github.com/webos-tools/cli/releases/download/v1.12.4/webos-cli-1.12.4.tar.gz | tar -xz -C $HOME/webos-cli
          echo "$HOME/webos-cli/bin" >> $GITHUB_PATH

      - name: Package IPK
        run: |
          mkdir -p build
          # O comando 'webos-package' gera o ipk baseado no seu appinfo.json
          webos-package . -o build/

      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v4 # Atualizado para v4 (Corrige o erro da imagem)
        with:
          name: tiktok-tv-app
          path: build/*.ipk
